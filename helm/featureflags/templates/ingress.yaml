{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: featureflags
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: {{ .Values.service.adminPort }}
          - path: /flags
            pathType: Prefix
            backend:
              service:
                name: sdk-service
                port:
                  number: {{ .Values.service.sdkPort }}
          - path: /audit
            pathType: Prefix
            backend:
              service:
                name: audit-service
                port:
                  number: {{ .Values.service.auditPort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.service.frontendPort }}
{{- end }}
