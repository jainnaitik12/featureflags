apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ (index .Values "frontend").image.repository }}:{{ (index .Values "frontend").image.tag }}"
          ports:
            - containerPort: {{ .Values.service.frontendPort }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.frontendPort }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.frontendPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: {{ .Values.service.frontendPort }}
      targetPort: {{ .Values.service.frontendPort }}
