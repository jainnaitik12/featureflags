apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: featureflags
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GITHUB_USERNAME/featureflags.git
    targetRevision: main
    path: helm/featureflags
  destination:
    server: https://kubernetes.default.svc
    namespace: featureflags
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
